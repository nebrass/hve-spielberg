<!-- Recap scene archetype (spec §7.2b). TUTORIAL MODE ONLY — non-tutorial scripts skip
     this beat. A static authored "what we just covered" beat, triggered by the ~90s
     segment cap. Deterministic: no Math.random/Date.now, no .play(), no <video>.
     autoAlpha entrance; paused timeline registered. -->
<template id="scene-NN-recap-template">
  <div data-composition-id="scene-NN-recap" data-width="1920" data-height="1080">
    <div class="recap">
      <div class="recap-kicker">RECAP</div>
      <h2 class="recap-title">What we just covered</h2>
      <ul class="recap-list">
        <li class="recap-item"><span class="rnum">1</span>REPLACE: step just covered</li>
        <li class="recap-item"><span class="rnum">2</span>REPLACE: second beat</li>
        <li class="recap-item"><span class="rnum">3</span>REPLACE: third beat</li>
      </ul>
    </div>
    <style>
      [data-composition-id="scene-NN-recap"]{position:absolute;inset:0;display:flex;
        align-items:center;justify-content:center;background:#0a0a0a /* brand canvas */;
        font-family:"Geist","Inter",system-ui,sans-serif;color:#fff;padding:120px;box-sizing:border-box}
      [data-composition-id="scene-NN-recap"] .recap{width:100%;max-width:1400px;display:flex;flex-direction:column;gap:40px}
      [data-composition-id="scene-NN-recap"] .recap-kicker{font-family:"Geist Mono","JetBrains Mono",monospace;
        font-size:28px;letter-spacing:.3em;color:#0a72ef;visibility:hidden;opacity:0}
      [data-composition-id="scene-NN-recap"] .recap-title{font-size:84px;font-weight:600;letter-spacing:-.03em;
        line-height:1.1;margin:0;visibility:hidden;opacity:0}
      [data-composition-id="scene-NN-recap"] .recap-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:28px}
      [data-composition-id="scene-NN-recap"] .recap-item{display:flex;align-items:center;gap:28px;font-size:44px;
        font-weight:400;color:#e6e6e6;visibility:hidden;opacity:0}
      [data-composition-id="scene-NN-recap"] .rnum{flex:0 0 auto;width:56px;height:56px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;background:#0a72ef;color:#fff;
        font-size:28px;font-weight:600;font-family:"Geist Mono","JetBrains Mono",monospace}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const root = '[data-composition-id="scene-NN-recap"]';
      tl.fromTo(root + ' .recap-kicker', { y: 16, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 0.1);
      tl.fromTo(root + ' .recap-title',  { y: 40, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.6, ease: "power3.out" }, 0.3);
      tl.fromTo(root + ' .recap-item',   { x: -30, autoAlpha: 0 }, { x: 0, autoAlpha: 1, duration: 0.45, ease: "power2.out", stagger: 0.18 }, 0.8);
      window.__timelines["scene-NN-recap"] = tl;
    </script>
  </div>
</template>
