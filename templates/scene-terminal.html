<!-- Terminal scene archetype (CLI capture default path). Author from REAL captured
     command output. Deterministic: command typed via a proxy+onUpdate slice (counter
     pattern), output revealed via autoAlpha stagger. No <video>; no new dependency. -->
<template id="scene-NN-terminal-template">
  <div data-composition-id="scene-NN-terminal" data-width="1920" data-height="1080">
    <div class="term">
      <div class="term-bar"><span class="dot dr"></span><span class="dot dy"></span><span class="dot dg"></span><span class="term-title">zsh</span></div>
      <div class="term-body">
        <div class="term-cmd"><span class="prompt">$</span> <span class="cmd-text"></span><span class="caret">▋</span></div>
        <div class="term-out">
          <div class="oline">REPLACE: real output line 1</div>
          <div class="oline">REPLACE: real output line 2</div>
        </div>
      </div>
    </div>
    <style>
      [data-composition-id="scene-NN-terminal"]{position:absolute;inset:0;display:flex;
        align-items:center;justify-content:center;background:#0a0a0a /* brand canvas */}
      [data-composition-id="scene-NN-terminal"] .term{width:80%;border-radius:12px;overflow:hidden;
        box-shadow:0 40px 120px rgba(0,0,0,.5);background:#161616;
        font-family:"Geist Mono","JetBrains Mono",monospace;visibility:hidden;opacity:0}
      [data-composition-id="scene-NN-terminal"] .term-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#222}
      [data-composition-id="scene-NN-terminal"] .dot{width:12px;height:12px;border-radius:50%}
      [data-composition-id="scene-NN-terminal"] .dr{background:#ff5f56}
      [data-composition-id="scene-NN-terminal"] .dy{background:#ffbd2e}
      [data-composition-id="scene-NN-terminal"] .dg{background:#27c93f}
      [data-composition-id="scene-NN-terminal"] .term-title{margin-left:8px;color:#888;font-size:20px}
      [data-composition-id="scene-NN-terminal"] .term-body{padding:28px 32px;color:#eaeaea;font-size:34px;line-height:1.5}
      [data-composition-id="scene-NN-terminal"] .prompt{color:#27c93f}
      [data-composition-id="scene-NN-terminal"] .caret{color:#eaeaea}
      [data-composition-id="scene-NN-terminal"] .oline{visibility:hidden;opacity:0;color:#b9f}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const root = '[data-composition-id="scene-NN-terminal"]';
      const CMD = "deploybot deploy";                 // REPLACE with the real command
      const cmdEl = document.querySelector(root + ' .cmd-text');  // scoped — avoids #id collisions across scenes
      const typed = { n: 0 };
      // Entrance: terminal rests hidden (CSS) and fades/raises in before typing.
      tl.fromTo(root + ' .term', { y: 30, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "power3.out" }, 0);
      // Type the command (proxy + onUpdate slice — seek-safe). Caret stays visible after
      // typing — intentional (cursor rests at end of command).
      tl.to(typed, { n: CMD.length, duration: 0.9, ease: "none",
        onUpdate: () => { cmdEl.textContent = CMD.slice(0, Math.round(typed.n)); } }, 0.2);
      tl.fromTo(root + ' .oline',
        { y: 8, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out", stagger: 0.2 }, 1.3);
      window.__timelines["scene-NN-terminal"] = tl;
    </script>
  </div>
</template>
