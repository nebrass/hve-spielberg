<template id="scene-02-pipeline-template">
  <div data-composition-id="scene-02-pipeline"
       data-width="1920" data-height="1080">

    <div class="pipeline-stack">
      <h2 id="ph-head" class="ph-head">Six phases. In order.</h2>

      <div class="phase-grid">
        <div class="chip" data-n="1">
          <span class="n">1</span>
          <span class="name">Discover the product</span>
          <span class="sub">using design thinking</span>
        </div>
        <div class="chip" data-n="2">
          <span class="n">2</span>
          <span class="name">Write the narrative</span>
          <span class="sub">promo or showcase, scene by scene</span>
        </div>
        <div class="chip" data-n="3">
          <span class="n">3</span>
          <span class="name">Capture the live app</span>
          <span class="sub">via Chrome DevTools, every viewport</span>
        </div>
        <div class="chip" data-n="4">
          <span class="n">4</span>
          <span class="name">Design the scenes</span>
          <span class="sub">brand DNA applied to HTML</span>
        </div>
        <div class="chip" data-n="5">
          <span class="n">5</span>
          <span class="name">Compose the timeline</span>
          <span class="sub">GSAP tweens, sub-second precision</span>
        </div>
        <div class="chip" data-n="6">
          <span class="n">6</span>
          <span class="name">Render the video</span>
          <span class="sub">headless Chrome, deterministic MP4</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene-02-pipeline"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
        font-family: "Geist", "Inter", system-ui, sans-serif;
        color: #171717;
        padding: 80px;
        box-sizing: border-box;
      }
      [data-composition-id="scene-02-pipeline"] .pipeline-stack {
        display: flex; flex-direction: column; align-items: center; gap: 56px;
        width: 100%;
      }
      [data-composition-id="scene-02-pipeline"] .ph-head {
        font-size: 80px;
        font-weight: 600;
        letter-spacing: -0.04em;
        margin: 0;
        visibility: hidden;
        opacity: 0;
      }
      [data-composition-id="scene-02-pipeline"] .phase-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 28px;
        width: 100%;
        max-width: 1500px;
      }
      [data-composition-id="scene-02-pipeline"] .chip {
        background: #ffffff;
        border-radius: 12px;
        padding: 28px 32px;
        display: flex; flex-direction: column; gap: 10px;
        min-height: 180px;
        visibility: hidden;
        opacity: 0;
        box-shadow:
          0 0 0 1px rgba(0,0,0,0.08),
          0 2px 4px rgba(0,0,0,0.04),
          0 12px 32px rgba(0,0,0,0.06);
      }
      [data-composition-id="scene-02-pipeline"] .chip .n {
        font-family: "Geist Mono", "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 500;
        color: #0a72ef;
        letter-spacing: 0;
      }
      [data-composition-id="scene-02-pipeline"] .chip .name {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.15;
        color: #171717;
      }
      [data-composition-id="scene-02-pipeline"] .chip .sub {
        font-size: 17px;
        font-weight: 400;
        color: #666666;
        letter-spacing: -0.005em;
        line-height: 1.4;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo("#ph-head",
        { y: 30, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "expo.out" },
        0.3);

      // 6 chips stagger in. fromTo() + autoAlpha is critical here — see
      // patterns/visual-patterns.md § "tl.from() stagger trap" and the
      // autoAlpha rule. autoAlpha handles opacity AND visibility together.
      tl.fromTo('[data-composition-id="scene-02-pipeline"] .chip',
        { y: 30, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.4, ease: "power3.out", stagger: 0.18 },
        1.0);

      window.__timelines["scene-02-pipeline"] = tl;
    </script>
  </div>
</template>
