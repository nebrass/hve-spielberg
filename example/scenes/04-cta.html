<template id="scene-04-cta-template">
  <div data-composition-id="scene-04-cta"
       data-width="1920" data-height="1080">

    <div class="cta-stack">
      <div id="install" class="install">/hve-spielberg</div>

      <hr id="rule" class="rule" />

      <div id="wm" class="wordmark">
        <span class="wm-char">h</span><span class="wm-char">v</span><span class="wm-char">e</span><span class="wm-char">-</span><span class="wm-char">s</span><span class="wm-char">p</span><span class="wm-char">i</span><span class="wm-char">e</span><span class="wm-char">l</span><span class="wm-char">b</span><span class="wm-char">e</span><span class="wm-char">r</span><span class="wm-char">g</span>
      </div>

      <div id="url" class="url">
        <span class="url-host">github.com/</span><span class="url-path">nebrass/hve-spielberg</span>
      </div>

      <div id="meta" class="meta">MIT · open source · your turn to ship something good</div>
    </div>

    <style>
      [data-composition-id="scene-04-cta"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
        font-family: "Geist", "Inter", system-ui, sans-serif;
        color: #171717;
      }
      [data-composition-id="scene-04-cta"] .cta-stack {
        display: flex; flex-direction: column; align-items: center; gap: 40px;
      }
      [data-composition-id="scene-04-cta"] .install {
        font-family: "Geist Mono", "JetBrains Mono", monospace;
        font-size: 56px;
        background: #0a0a0a;
        color: #f5f5f5;
        padding: 28px 64px;
        border-radius: 12px;
        letter-spacing: -0.01em;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-04-cta"] .rule {
        width: 0; height: 1px;
        border: 0;
        background: #cccccc;
      }
      [data-composition-id="scene-04-cta"] .wordmark {
        font-size: 96px;
        font-weight: 600;
        letter-spacing: -0.06em;
        display: flex;
      }
      [data-composition-id="scene-04-cta"] .wm-char { visibility: hidden; opacity: 0; }
      [data-composition-id="scene-04-cta"] .url {
        font-family: "Geist Mono", "JetBrains Mono", monospace;
        font-size: 32px;
        letter-spacing: -0.005em;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-04-cta"] .url-host { color: #888888; }
      [data-composition-id="scene-04-cta"] .url-path { color: #171717; font-weight: 500; }
      [data-composition-id="scene-04-cta"] .meta {
        font-size: 24px;
        font-weight: 400;
        color: #4d4d4d;
        letter-spacing: -0.005em;
        visibility: hidden; opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Install pill — bare slash command, no argument
      tl.fromTo("#install",
        { y: 40, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.6, ease: "expo.out" },
        0.3);

      // Hairline rule extends
      tl.to("#rule", { width: 540, duration: 0.7, ease: "power2.inOut" }, 0.9);

      // 13 wordmark characters stagger in. fromTo() + autoAlpha critical for stagger.
      tl.fromTo('[data-composition-id="scene-04-cta"] .wm-char',
        { y: 20, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.4, ease: "power2.out", stagger: 0.06 },
        1.1);

      // URL row — the canonical address spoken in the VO
      tl.fromTo("#url",
        { y: 14, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" },
        2.2);

      // Meta line at the bottom — last to appear
      tl.fromTo("#meta",
        { y: 10, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.4, ease: "power2.out" },
        2.9);

      // Final scene — held from ~3.4s through scene end. No exit animation.
      window.__timelines["scene-04-cta"] = tl;
    </script>
  </div>
</template>
