<template id="scene-01-how-template">
  <div data-composition-id="scene-01-how"
       data-width="1920" data-height="1080">

    <div class="frame">
      <div id="term" class="terminal">
        <div class="term-chrome">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
          <span class="title">claude code</span>
        </div>

        <div class="term-body">
          <div class="prompt-line" id="cmd">
            <span class="prompt">$</span>
            <span class="cmd-text">/hve-spielberg</span>
          </div>

          <div class="check check-1">
            <span class="mark">✓</span>
            <span class="label">Interviewed about your product</span>
          </div>
          <div class="check check-2">
            <span class="mark">✓</span>
            <span class="label">Picked the Vercel design system</span>
          </div>
          <div class="check check-3">
            <span class="mark">✓</span>
            <span class="label">Captured your live app</span>
          </div>
          <div class="check check-4">
            <span class="mark">✓</span>
            <span class="label">Rendered <span class="filename">final.mp4</span></span>
          </div>

          <div class="done" id="done">
            <span class="done-label">Done in</span>
            <span class="done-time">14m 22s</span>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene-01-how"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
        font-family: "Geist", "Inter", system-ui, sans-serif;
        color: #171717;
        padding: 80px;
        box-sizing: border-box;
      }
      [data-composition-id="scene-01-how"] .frame {
        width: 100%; max-width: 1500px;
      }
      [data-composition-id="scene-01-how"] .terminal {
        background: #0a0a0a;
        border-radius: 16px;
        overflow: hidden;
        visibility: hidden; opacity: 0;
        box-shadow:
          0 0 0 1px rgba(0,0,0,0.10),
          0 8px 24px rgba(0,0,0,0.08),
          0 32px 64px rgba(0,0,0,0.12);
      }
      [data-composition-id="scene-01-how"] .term-chrome {
        display: flex; align-items: center; gap: 10px;
        padding: 18px 24px;
        border-bottom: 1px solid #1a1a1a;
      }
      [data-composition-id="scene-01-how"] .dot {
        width: 14px; height: 14px; border-radius: 50%;
      }
      [data-composition-id="scene-01-how"] .dot-r { background: #ff5f57; }
      [data-composition-id="scene-01-how"] .dot-y { background: #febc2e; }
      [data-composition-id="scene-01-how"] .dot-g { background: #28c840; }
      [data-composition-id="scene-01-how"] .term-chrome .title {
        margin-left: 16px;
        font-family: "Geist Mono", "JetBrains Mono", monospace;
        font-size: 20px;
        color: #888;
        letter-spacing: 0;
      }
      [data-composition-id="scene-01-how"] .term-body {
        padding: 44px 48px 48px;
        font-family: "Geist Mono", "JetBrains Mono", monospace;
        font-size: 32px;
        line-height: 1.7;
        color: #f5f5f5;
      }
      [data-composition-id="scene-01-how"] .prompt-line {
        margin-bottom: 28px;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-01-how"] .prompt { color: #00ff87; margin-right: 16px; }
      [data-composition-id="scene-01-how"] .cmd-text { color: #f5f5f5; }
      [data-composition-id="scene-01-how"] .check {
        display: flex; align-items: center; gap: 16px;
        margin: 8px 0;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-01-how"] .check .mark {
        color: #00ff87;
        font-size: 28px;
        width: 32px;
        display: inline-flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene-01-how"] .check .label { color: #d0d0d0; }
      [data-composition-id="scene-01-how"] .check .filename { color: #0a72ef; }
      [data-composition-id="scene-01-how"] .done {
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid #1f1f1f;
        display: flex; align-items: baseline; gap: 18px;
        visibility: hidden; opacity: 0;
      }
      [data-composition-id="scene-01-how"] .done-label { color: #888; font-size: 26px; }
      [data-composition-id="scene-01-how"] .done-time {
        color: #f5f5f5;
        font-size: 32px;
        font-weight: 500;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Terminal panel slides in
      tl.fromTo("#term",
        { y: 40, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.6, ease: "power3.out" },
        0.2);

      // Command prompt appears
      tl.fromTo("#cmd",
        { x: -12, autoAlpha: 0 },
        { x: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out" },
        0.7);

      // 4 checkmark lines stagger in. fromTo() + stagger handles the
      // "each later staggered tween re-hides previous siblings" pitfall
      // by declaring both states explicitly.
      tl.fromTo(
        '[data-composition-id="scene-01-how"] .check',
        { x: -16, autoAlpha: 0 },
        { x: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out", stagger: 0.55 },
        1.3);

      // Final "Done in 14m 22s" line appears after the last checkmark settles
      tl.fromTo("#done",
        { y: 8, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.45, ease: "power2.out" },
        3.7);

      window.__timelines["scene-01-how"] = tl;
    </script>
  </div>
</template>
