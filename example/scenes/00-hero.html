<template id="scene-00-hero-template">
  <div data-composition-id="scene-00-hero"
       data-width="1920" data-height="1080">

    <div class="hero-stack">
      <h1 id="hl" class="headline">One slash command.</h1>
      <p id="sub" class="subtitle">
        <span class="mh-highlight-wrap">
          <span class="mh-highlight-bar" id="mh-this"></span>
          <span class="mh-highlight-text">This whole video.</span>
        </span>
        Made in Claude Code.
      </p>
    </div>

    <style>
      [data-composition-id="scene-00-hero"] {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
        font-family: "Geist", "Inter", system-ui, sans-serif;
        color: #171717;
      }
      [data-composition-id="scene-00-hero"] .hero-stack {
        display: flex; flex-direction: column; align-items: center; gap: 36px;
        text-align: center;
      }
      [data-composition-id="scene-00-hero"] .headline {
        font-size: 180px;
        font-weight: 600;
        letter-spacing: -0.06em;
        line-height: 1.05;
        margin: 0;
        padding: 24px 0;
        max-width: 1700px;
        /* autoAlpha sets opacity:0 + visibility:hidden — see patterns/visual-patterns.md
           § "Never animate visibility or display". */
        visibility: hidden;
        opacity: 0;
      }
      [data-composition-id="scene-00-hero"] .subtitle {
        font-size: 56px;
        font-weight: 400;
        letter-spacing: -0.02em;
        color: #4d4d4d;
        margin: 0;
        visibility: hidden;
        opacity: 0;
      }
      [data-composition-id="scene-00-hero"] .mh-highlight-wrap {
        position: relative; display: inline-block;
      }
      [data-composition-id="scene-00-hero"] .mh-highlight-bar {
        position: absolute;
        top: 8px; left: -10px; right: -10px; bottom: 8px;
        background: #ff5b4f;        /* Vercel ship-red accent */
        opacity: 0.30;
        transform: scaleX(0);
        transform-origin: left center;
        border-radius: 4px;
        z-index: 0;
      }
      [data-composition-id="scene-00-hero"] .mh-highlight-text {
        position: relative; z-index: 1;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // autoAlpha tweens opacity AND visibility in one property. Use this any
      // time you'd otherwise tween visibility/display (which GSAP can't).
      tl.fromTo("#hl",
        { y: 60, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.7, ease: "expo.out" },
        0.3);
      tl.fromTo("#sub",
        { y: 24, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: "power2.out" },
        1.1);
      // Marker-sweep on "This whole video." — fires AFTER the subtitle settles.
      tl.to("#mh-this", { scaleX: 1, duration: 0.5, ease: "power2.out" }, 1.8);

      window.__timelines["scene-00-hero"] = tl;
    </script>
  </div>
</template>
